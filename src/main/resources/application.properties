spring.application.name=redcross

# 服务端口
server.port=8080

# DeepSeek API 配置
# 本地开发：在 application.properties 或系统环境变量 DEEPSEEK_API_KEY 中配置
# 生产部署：使用环境变量或 Secrets 管理，不要把 Key 提交到 Git
deepseek.api.key=${DEEPSEEK_API_KEY:}
deepseek.api.url=https://api.deepseek.com/chat/completions
deepseek.api.model=deepseek-chat
deepseek.api.timeout-seconds=30

# CORS：允许前端开发服务器访问（Vite 默认 5173 端口）
# 如需部署到生产，请改为您实际的域名
app.cors.allowed-origins=http://localhost:5173,http://localhost:5174

# 限流：每 IP 每 60 秒最多 10 次 AI 调用
app.rate-limit.requests-per-minute=10
